# Spring Boot Application Configuration for Fact-Checker HTTP Client

spring:
  application:
    name: fact-checker-http-client

  # Web Configuration
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    async:
      request-timeout: 300000 # 5 minutes
  
  # Thymeleaf Configuration
  thymeleaf:
    cache: false # Disable cache in development
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
  
  # Jackson JSON Configuration
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      force: true
  async:
    request-timeout: 300000 # 5 minutes

# Fact-Check Server Configuration
factcheck:
  server:
    url: http://localhost:8001
    timeout: 300 # seconds
  client:
    name: fact-checker-http-client
    version: 1.0.0

# Logging Configuration
logging:
  level:
    com.factchecker: DEBUG
    org.springframework.web: INFO
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/fact-checker-client.log

# Management Configuration (for monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Custom Application Information
info:
  app:
    name: Fact-Checker HTTP Client
    description: Spring AI client for fact-checking via Python HTTP server
    version: 1.0.0
    author: AI System
  factcheck:
    server-url: ${factcheck.server.url}
    protocol: HTTP
    endpoints: /fact-check, /classify, /training-data

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  
  thymeleaf:
    cache: false
  
logging:
  level:
    com.factchecker: DEBUG
    org.springframework.web.reactive: DEBUG

factcheck:
  server:
    url: http://localhost:8001

---
# Production Profile  
spring:
  config:
    activate:
      on-profile: prod
      
  thymeleaf:
    cache: true

logging:
  level:
    com.factchecker: INFO
    root: WARN

factcheck:
  server:
    url: ${FACTCHECK_SERVER_URL:http://localhost:8001}

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker
      
  thymeleaf:
    cache: true

logging:
  level:
    com.factchecker: INFO
    org.springframework.web.reactive: INFO
    root: INFO

factcheck:
  server:
    url: ${FACTCHECK_SERVER_URL:http://fact-check-server:8001}
  client:
    timeout: 300 # Longer timeout for Docker networking